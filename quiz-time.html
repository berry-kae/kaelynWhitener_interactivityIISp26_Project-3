<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styleSheet.css">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
<div id="bgcolor4">
<div class="page">
<div class="quiz-container">
  <form id="quiz-form">
    <div class="d-flex">
      <div class="question">
        <h3>How will you find the escape?</h3>
        <div class="answers">
          <label>
            <input type="radio" id="a">
            meowing until it appears
          </label>
          <label>
            <input type="radio" id="b">
            scratching the screen
          </label>
          <label>
            <input type="radio" id="c">
            entering the space-time continuum
          </label>
          <label>
            <input type="radio" id="d">
            running away
          </label>
        </div>
      </div>
      
    </div>
    <button type="button" id="submit"
    onclick="document.getElementById('explosion').classList.remove('hidden')">submit answer</button>
</div>
</div>
<a href="no-escape.html">
    <img src="images/cat-explosion.jpg" class="hidden" img id="explosion">
</a>


<script>
    const container = document.getElementById("page")

    for(let i=0; i<5; i++){
      let img = document.createElement('img');
      img.src = "images/cat-explosion.jpg";
      container.appendChild("img"); //add loop to page

    }
</script>


</body>
</html>
