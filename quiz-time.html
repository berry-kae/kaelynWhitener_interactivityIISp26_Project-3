<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styleSheet.css">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
<div id="bgcolor4">

<div class="quiz-container">
  <form id="quiz-form">
    <div class="d-flex">
      <div class="question">
        <h3>How will you find the escape?</h3>
        <div class="answers">
          <label>
            <input type="radio" name="q1" value="a">
            meowing until it appears
          </label>
          <label>
            <input type="radio" name="q1" value="b">
            scratching the screen
          </label>
          <label>
            <input type="radio" name="q1" value="c">
            entering the space-time continuum
          </label>
          <label>
            <input type="radio" name="q1" value="d">
            running away
          </label>
        </div>
      </div>
      
    </div>
    <button type="submit" id="submit-btn">Submit</button>
  </form>
  
  <div class="result" id="result"></div>
   <img src="images\cat-explosion.jpg"  img id= "explosion">
   <div id="overlay" class="hidden"></div>
        <div id="popupBox" class="hidden">
</div>



<script>
const quizForm = document.getElementById('quiz-form');
const resultDiv = document.getElementById('result');
const correctAnswers = ['c'];
quizForm.addEventListener('submit', e => {
  e.preventDefault();
});

function catPopup() {
            const over =
                document.getElementById(
                    "overlay"
                );
            const popupBox =
                document.getElementById(
                    "popupBox"
                );
            over.classList.toggle("hidden");
            popupBox.classList.toggle(
                "hidden"
            ); }

function checkAnswer(form) {
    var answer = form.Answer.value;
    if (answer == "c") {
        catPopup();
    }
    else {
        alert("Incorrect")
    }
}​

</script>

</div>
</body>
</html>
