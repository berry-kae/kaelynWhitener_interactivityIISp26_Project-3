<!DOCTYPE html>
<html lang="en">
<head>
    <title> JavaScript eventListener Tutorial </title>
</head>
<body>
    <button id="thisButton">This Button </button>
    <p id ="message"></p>
</body>
<script>
    const button = document.getElementById('thisButton');
    button.addEventListener('click',function(){
        document.getElementById('message').innerText = "button was clicked!";
    });
</script>

</html>
