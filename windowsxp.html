<!DOCTYPE html>
<html lang="en">
<head>

<div class="title-bar">
  <div class="title-bar-text">SPACE STATION</div>
  <div class="title-bar-controls">
    <button aria-label="Close"></button>
  </div>
</div>

<body>
        <button type="button" id="openButton" onclick="openFunction(); playAudio()">
            <strong>?</strong>
        </button>
        <audio id="alien-takeover">
            <source src="audios\Alien_arrival_sound.mp3" type="audio/mpeg">
        </audio>
        <div id="overlay" class="hidden"></div>
        <div id="popupBox" class="hidden">
           <div id="divWindow">
<div class="window" style="width: 515px">
  <div class="title-bar">
    <div class="title-bar-text">you've been invaded!~ ★</div>
    <div class="title-bar-controls">
      <button aria-label="Minimize"></button>
      <button aria-label="Maximize"></button>
      <button aria-label="Close"></button>
       
    </div>
  </div>
  <div class="window-body" id="window-body" class="hidden">
    <a href="paradise.html">
  <img src="images\alien-gif.gif"  img id= "alien">
</a>
  </div>
</div>
            <button type="button" id="closeButton" onclick="changeColor()"> close </button>
        </div>
    </div>


</body>
    <script>
        function openFunction() {
            const over =
                document.getElementById(
                    "overlay"
                );
            const popupBox =
                document.getElementById(
                    "popupBox"
                );
            over.classList.toggle("hidden");
            popupBox.classList.toggle(
                "hidden"
            );
        }
       function changeColor(){
        const colors = ['red', 'green', 'blue', 'yellow', 'purple', 'orange'];
        const randomColor = colors[Math.floor(Math.random()* colors.length)];
        document.body.style.backgroundColor = randomColor;
       }
    
       let i = 1;
        let body = document.getElementsByTagName("body")[0];

        for (i; i <= 200; i++) {
        let button = document.createElement("button");
        button.innerHTML = '?';
        body.appendChild(button);
    
        }
        function playAudio() {
        var x = document.getElementById("alien-takeover");
        x.play();
        
        }
        const myAudio = document.getElementById("alien-takeover");
        myAudio.volume = 0.1;

        const myButton = document.getElementById('closeButton');
        myButton.addEventListener('click', function() {
        window.location.href = 'paradise.html';
        });
    
    </script>
